<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatternSpeak : Admin Page</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+Myanmar:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body class="min-h-screen">

    {{> header }}
    <main class="relative flex flex-col md:flex-row bg-white" id="mainContainer">
        <div class="fixed w-full md:w-1/7">{{> sidenav }}</div>
        <div class="ml-0 md:ml-[14.2857143%] content-container w-full h-full md:w-6/7">
            <div class="flex flex-col items-center justify-center gap-6 p-6 h-full w-full bg-white">
                <div
                    class="mt-6 w-50 h-50 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <img id="content-logo" alt="" class="w-full h-full drop-shadow-md object-cover animate-bounce">
                </div>
                <span class="text-secondary text-4xl font-extrabold tracking-tight uppercase">LEARN <i
                        class="me-1 lowercase">through</i> <span class="text-primary"> EVERYTHING </span></span>
            </div>
        </div>
    </main>

    <!-- Overlay & Sheet -->
    <div id="modalOverlay"
        class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-[80] transition-opacity duration-300 opacity-0">
    </div>

    <!-- <script type="module" src="../assets/js/admin.js"></script> -->
    <script type="module">
        import { tokenCheck, getBasePath, logo } from "../assets/js/config.js";
        const logoImg = document.getElementById("content-logo");
        logoImg.src = logo;

        const init = async () => {
            const isAuthenticated = await tokenCheck('admin');
            console.log("isAuthenticated: ", isAuthenticated);
            if (!isAuthenticated) {
                window.location.href = getBasePath() + "admin/login/";
            }
        };
        init();

    </script>
</body>

</html>
