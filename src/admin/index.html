<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatternSpeak : Admin Page</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+Myanmar:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        /* :root {
            --brand-primary: #3b82f6;
            --brand-secondary: #a855f7;
            --bg-dark: #09090b;
            --card-bg: #18181b;
        } */

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', 'Noto Sans Myanmar', sans-serif;
            /* background-color: var(--bg-dark); */
            /* color: #f4f4f5; */
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism & Effects */
        .glass-nav {
            background: white;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bento-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bento-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        /* Interactive Lyrics */
        .lyric-line {
            padding: 6px 12px;
            margin: 2px -12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: block;
            width: fit-content;
            white-space: pre-wrap;
        }

        .lyric-line:hover {
            background: rgba(59, 130, 246, 0.08);
            color: #f4f4f5;
        }

        .lyric-line.active {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            font-weight: 600;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.05);
        }

        /* Sheet Animation */
        .sheet-transition {
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .sheet-hidden {
            transform: translateY(105%);
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 10px;
        }

        .vocab-list::-webkit-scrollbar {
            width: 4px;
        }
    </style>
</head>

<body class="min-h-screen bg-primary">

    {{> header }}
    <main class="flex flex-col md:flex-row bg-white" id="mainContainer">
        <div class="w-full md:w-1/7">{{> sidenav }}</div>
        <div class="content-container w-full md:w-6/7 bg-white shadow-xl border border-slate-200">
            <div class="header h-[56px] px-6 flex items-center border-b border-slate-200">
                <h1 class="text-2xl font-bold text-slate-800">English Speaking Patterns</h1>
            </div> 
            <div class="content p-6">
                <form id="userForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Level</label>
                            <select id="user" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition bg-white">
                                <option value="Paa Paa">Paa Paa</option>
                                <option value="Maa Maa">Maa Maa</option>
                                <option value="Son">Son</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Type</label>
                            <select id="type" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition bg-white">
                                <option value="Walking">Walking</option>
                                <option value="Running">Running</option>
                                <option value="Reading">Reading</option>
                                <option value="Coding">Coding</option>
                                <option value="Workout">Workout</option>
                                <option value="Meditation">Meditation</option>
                                <option value="Learning">Learning</option>
                                <option value="Stretching">Stretching</option>
                                <option value="Gym">Gym</option>
                                <option value="Cycling">Cycling</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Date</label>
                            <input type="date" id="date" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Duration</label>
                            <div id="timeInputContainer"></div>
                        </div>
                    </div>

                    <div id="distanceContainer">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Distance (KM)</label>
                        <input type="number" id="distance" step="0.01" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="e.g. 5.25">
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition shadow-md hover:shadow-lg flex items-center justify-center">
                        <span id="btnText">Create Activity</span>
                        <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin ml-2"></div>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- Overlay & Sheet -->
    <div id="modalOverlay"
        class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-[80] transition-opacity duration-300 opacity-0">
    </div>

    <script type="module" src="../assets/js/admin.js"></script>
</body>

</html>
