<form id="patternForm" class="space-y-4">
    <div class="flex flex-col md:flex-row gap-4">
        <div class="w-full md:w-1/8">
            <label class="block text-sm font-medium text-slate-700 mb-1">Level</label>
            <select id="level" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-light focus:border-transparent outline-none transition bg-white">
            </select>
        </div>
        <div class="w-full md:w-1/2">
            <label class="block text-sm font-medium text-slate-700 mb-1">Title</label>
            <input type="text" id="title" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-light focus:border-transparent outline-none transition" placeholder="Enter title">
        </div>
        <div class="w-full md:w-1/2">
            <label class="block text-sm font-medium text-slate-700 mb-1">Formula</label>
            <input type="text" id="formula" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-light focus:border-transparent outline-none transition" placeholder="Enter formula">
        </div>
    </div>

    <div class="flex flex-col gap-4">
        <div class="flex flex-col gap-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">Explanation (EN, JA, MY)</label>
            <textarea id="explanationEn" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-light focus:border-transparent outline-none transition" placeholder="Enter explanation in English"></textarea>
            <textarea id="explanationJa" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-light focus:border-transparent outline-none transition" placeholder="Enter explanation in Japanese"></textarea>
            <textarea id="explanationMy" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-light focus:border-transparent outline-none transition" placeholder="Enter explanation in Myanmar"></textarea>
        </div>
    </div>

    <div class="flex flex-col gap-2">
        <label class="block text-sm font-medium text-slate-700 mb-1">Example Sentences</label>
        <div id="exampleSentencesContainer" class="flex flex-col gap-2">
            <div class="relative flex items-center gap-2">
                <textarea id="exampleSentence1" required class="example-sentence w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-light focus:border-transparent outline-none transition" placeholder="Enter example sentence 1"></textarea>
            </div>
        </div>
        <button type="button" id="addExampleBtn" class="cursor-pointer bg-primary hover:bg-primary-dark text-white font-semibold py-2 px-4 rounded-lg transition shadow-md hover:shadow-lg w-max">Add Example</button>
        
    </div>

    <button type="submit" id="submitBtn" class="cursor-pointer w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-lg transition shadow-md hover:shadow-lg flex items-center justify-center">
        <span id="btnText">Create Pattern</span>
        <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin ml-2"></div>
    </button>
</form>

<script type="module">
    import { api } from "/assets/js/api.js";
    import { loadingSpinner } from "/assets/js/config.js";

    const displayArea = document.getElementById('displayArea');
    const addExampleBtn = document.getElementById('addExampleBtn');
    const exampleSentencesContainer = document.getElementById('exampleSentencesContainer');
    const patternForm = document.getElementById('patternForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');

    // Example Sentences အတွက် Count ကို Track လုပ်မယ့် Variable
    let exampleCount = 1;
    // Levels Data ကို Store လုပ်မယ့် Variable
    let levels = [];

    // English Speaking Patterns Levels Dropdown အတွက် Data Fetch လုပ်မယ့် Function
    async function getPatternLevels() {
        try {
            
            const response = await api.getLevels();
            console.log("Levels: ", response);
            levels = response.map(entry => {
                return {
                    "id": entry[0],
                    "value": entry[1],
                    "label_en": entry[2],
                    "label_ja": entry[3],
                    "label_my": entry[4]
                };
            });
            const levelSelect = document.getElementById('level');
            levelSelect.innerHTML = ''; // Clear existing options
            levels.forEach(level => {
                const option = document.createElement('option');
                option.value = level.id;
                option.textContent = level.label_en;
                levelSelect.appendChild(option);
            });

        } catch (error) {
            console.error("Error fetching levels: ", error);
        }
    }
    // Page Load အချိန်မှာ Levels Data ကို Fetch လုပ်မယ့် Function ကို ခေါ်မယ်
    getPatternLevels();

    // Example Sentences အတွက် Add Example Button ကို Click လုပ်တဲ့အခါ New Example Field တစ်ခုထပ်ထည့်မယ့် Function
    addExampleBtn.addEventListener('click', () => {
        exampleCount++;
        const newExample = document.createElement('textarea');
        newExample.id = `exampleSentence${exampleCount}`;
        newExample.required = true;
        newExample.className = "example-sentence w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-light focus:border-transparent outline-none transition";
        newExample.placeholder = `Enter example sentence ${exampleCount}`;
        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.innerHTML = `<svg 
                        class="size-5" 
                        fill="none" 
                        viewBox="0 0 24 24" 
                        stroke="currentColor" 
                        stroke-width="2"
                    >
                        <path 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" 
                        />
                    </svg>`;
        removeBtn.className = "absolute right-3 cursor-pointer bg-gray-500 hover:bg-gray-600 text-white font-semibold py-1 px-3 rounded-lg transition shadow-md hover:shadow-lg w-max";
        removeBtn.addEventListener('click', () => {
            exampleSentencesContainer.removeChild(newExample.parentElement);
        });
        const exampleWrapper = document.createElement('div');
        exampleWrapper.className = "relative flex items-center gap-2";
        exampleWrapper.appendChild(newExample);
        exampleWrapper.appendChild(removeBtn);
        exampleSentencesContainer.appendChild(exampleWrapper);
    }); 

    // Pattern Form ကို Submit လုပ်တဲ့အခါ Data ကို Collect လုပ်ပြီး DB သို့ပို့မယ့် Function
    patternForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        btnText.textContent = 'Submitting...';
        btnLoader.classList.remove('hidden');
        const level = document.getElementById('level').value;
        const title = document.getElementById('title').value;
        const formula = document.getElementById('formula').value;
        const explanationEn = document.getElementById('explanationEn').value;
        const explanationJa = document.getElementById('explanationJa').value;
        const explanationMy = document.getElementById('explanationMy').value;
        const exampleSentences = [];
        for (let i = 1; i <= exampleCount; i++) {
            const sentence = document.getElementById(`exampleSentence${i}`);
            if (sentence) {
                exampleSentences.push(sentence.value);
            }
        }
        const patternData = {
            level,
            title,
            formula,
            explanationEn,
            explanationJa,
            explanationMy,
            exampleSentences
        };
        console.log("Pattern Data: ", patternData);
        api.savePattern(patternData)
            .then(response => {
                console.log("Pattern saved successfully: ", response);
                // Reset the form after successful submission
                patternForm.reset();
                exampleSentencesContainer.innerHTML = `
                    <div class="relative flex items-center gap-2">
                        <textarea id="exampleSentence1" required class="example-sentence w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary-light focus:border-transparent outline-none transition" placeholder="Enter example sentence 1"></textarea>
                    </div>
                `;
                exampleCount = 1;
            })
            .catch(error => {
                console.error("Error saving pattern: ", error);
            })
            .finally(() => {
                btnText.textContent = 'Create Pattern';
                btnLoader.classList.add('hidden');
            }); 
        // Here you can send the patternData to your server or API
        // After submission, reset the form and loader
        btnText.textContent = 'Create Pattern';
        btnLoader.classList.add('hidden');
    });
</script>
