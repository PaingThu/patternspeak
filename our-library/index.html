<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Library</title>
    <!-- Added crossorigin to help with CDN requests -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal-overlay {
            transition: opacity 0.2s ease-out;
            display: none;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
  <script type="module" crossorigin src="../assets/our-library-CDMiSHHW.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/modulepreload-polyfill-BvsmSo4J.js">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <i data-lucide="book-marked" class="text-indigo-600 w-8 h-8"></i>
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600">
                        Our Library
                    </h1>
                </div>
                
                <button id="open-modal-btn" class="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-full hover:bg-indigo-700 transition-all shadow-sm active:scale-95">
                    <i data-lucide="plus" size="20"></i>
                    <span class="hidden sm:inline">Add Book</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Controls Section -->
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size="18"></i>
                <input 
                    type="text" 
                    id="search-input"
                    placeholder="Search by title or author..."
                    class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all"
                >
            </div>
            
            <div class="flex gap-2">
                <div class="relative flex items-center">
                    <i data-lucide="filter" size="16" class="absolute left-3 text-slate-400"></i>
                    <select 
                        id="status-filter"
                        class="pl-9 pr-8 py-2 bg-white border border-slate-200 rounded-xl appearance-none focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 cursor-pointer"
                    >
                        <option value="All">All Status</option>
                        <option value="Finished">Finished</option>
                        <option value="Reading">Reading</option>
                        <option value="Wishlist">Wishlist</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Book Grid -->
        <div id="book-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Books will be rendered here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-20">
            <div class="bg-slate-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="book-open" class="text-slate-400" size="32"></i>
            </div>
            <h3 class="text-lg font-semibold text-slate-800">No books found</h3>
            <p class="text-slate-500">Try adjusting your search or add a new book.</p>
        </div>
    </main>

    <!-- Add Book Modal -->
    <div id="modal-overlay" class="modal-overlay fixed inset-0 z-50 items-center justify-center p-4 sm:p-6 bg-slate-900/40 backdrop-blur-sm">
        <div class="relative bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-xl font-bold text-slate-800">Add New Book</h2>
                <button id="close-modal-btn" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x" size="24"></i>
                </button>
            </div>
            
            <form id="add-book-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Book Title</label>
                    <input 
                        required
                        id="form-title"
                        type="text" 
                        class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all"
                        placeholder="e.g. The Great Gatsby"
                    >
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Author</label>
                    <input 
                        required
                        id="form-author"
                        type="text" 
                        class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all"
                        placeholder="e.g. F. Scott Fitzgerald"
                    >
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
                        <select 
                            id="form-status"
                            class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all"
                        >
                            <option value="Finished">Finished</option>
                            <option value="Reading">Reading</option>
                            <option value="Wishlist">Wishlist</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Rating</label>
                        <select 
                            id="form-rating"
                            class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all"
                        >
                            <option value="5">5 Stars</option>
                            <option value="4">4 Stars</option>
                            <option value="3">3 Stars</option>
                            <option value="2">2 Stars</option>
                            <option value="1">1 Star</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Notes</label>
                    <textarea 
                        id="form-notes"
                        rows="3"
                        class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all resize-none"
                        placeholder="What did you think of this book?"
                    ></textarea>
                </div>

                <button 
                    type="submit"
                    class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-500/20 transition-all active:scale-[0.98] mt-2"
                >
                    Save Book
                </button>
            </form>
        </div>
    </div>


    <script>
        // Initial State
        
    </script>
</body>
</html>
