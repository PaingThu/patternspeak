<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Daily Activities : Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
  <script type="module" crossorigin src="../../assets/admin/login-zazBk5ar.js"></script>
  <link rel="modulepreload" crossorigin href="../../assets/modulepreload-polyfill-BvsmSo4J.js">
  <link rel="modulepreload" crossorigin href="../../assets/config-BEWyegNS.js">
</head>

<body class="bg-slate-50 min-h-screen text-slate-900">

    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center px-4 bg-black">
        <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
            <div class="text-center mb-8">
                <div class="flex flex-col items-center justify-center gap-3">
                    <div
                        class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3">
                            </path>
                        </svg>
                    </div>
                    <span class="text-xl font-extrabold tracking-tight uppercase">LEARN <i
                            class="me-1 lowercase">through</i> <span class="text-blue-500"> EVERYTHING </span></span>
                </div>
                <h1 class="mt-3 text-2xl font-bold text-slate-800">Admin Login</h1>
                <!-- <p class="text-slate-500 text-sm">Verify credentials to access the logger</p> -->
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Admin ID</label>
                    <input type="text" id="adminId" required
                        class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition"
                        placeholder="e.g. admin1">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" required
                        class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition"
                        placeholder="••••••••">
                </div>
                <button type="submit" id="loginBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition flex items-center justify-center">
                    <span id="loginBtnText">Login</span>
                    <div id="loginBtnLoader"
                        class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin ml-2">
                    </div>
                </button>
            </form>
            <div id="displayArea" class="space-y-4 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar"></div>
            <div id="loginStatus" class="mt-4 hidden p-3 rounded-lg text-sm text-center"></div>
        </div>
    </div>

</body>

</html>
